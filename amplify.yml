version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist/nearbite-admin/browser
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Cache-Control'
          value: 'no-store'
  # Rewrites and redirects
  # Rules are evaluated top-to-bottom; first match wins.
  redirects:
    # Standard SPA rewrite - serve index.html for all non-file Angular routes.
    - source: /<*>
      target: /index.html
      status: '200'
      condition: null
