<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

  .yd-deal {
    width: 100%;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 2px;
    color: #231f20;
    background: #ffffff;
  }

  .yd-deal-hero {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: #fff2df;
  }

  .yd-deal-hero img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    display: block;
  }

  .yd-deal-badge {
    position: absolute;
    left: 12px;
    top: 12px;
    padding: 7px 10px;
    border-radius: 999px;
    background: rgba(232, 53, 42, 0.94);
    color: #ffffff;
    font: 600 12px/1.1 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: 0.2px;
  }

  .yd-deal-body {
    padding: 0 2px 2px;
  }

  .yd-deal-kicker {
    margin: 0 0 6px;
    color: #e8352a;
    font: 600 12px/1.2 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .yd-deal-title {
    margin: 0;
    color: #241f1a;
    font: 600 clamp(22px, 7vw, 30px)/1.08 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    letter-spacing: -0.4px;
  }

  .yd-deal-copy {
    margin: 10px 0 0;
    color: #6f6257;
    font: 400 14px/1.48 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .yd-deal-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }

  .yd-deal-stat {
    padding: 10px;
    border-radius: 13px;
    background: #fff7ed;
    border: 1px solid #f5dfc4;
  }

  .yd-deal-stat strong {
    display: block;
    color: #241f1a;
    font: 600 18px/1 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  .yd-deal-stat span {
    display: block;
    margin-top: 4px;
    color: #887a6c;
    font: 500 11px/1.2 Poppins, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
</style>

<div class="yd-deal">
  <div class="yd-deal-hero">
    <img
      alt="Hot biryani bowl deal"
      src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 600'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='40%25' r='70%25'%3E%3Cstop offset='0%25' stop-color='%23fff4d6'/%3E%3Cstop offset='58%25' stop-color='%23ffbe67'/%3E%3Cstop offset='100%25' stop-color='%23e8352a'/%3E%3C/radialGradient%3E%3ClinearGradient id='plate' x1='0' x2='1'%3E%3Cstop stop-color='%23fffaf0'/%3E%3Cstop offset='1' stop-color='%23f0d7b7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='800' height='600' rx='42' fill='url(%23g)'/%3E%3Ccircle cx='400' cy='365' r='210' fill='url(%23plate)'/%3E%3Ccircle cx='400' cy='365' r='156' fill='%23b85b24'/%3E%3Cg fill='%23ffd36b'%3E%3Cellipse cx='330' cy='315' rx='42' ry='14' transform='rotate(-22 330 315)'/%3E%3Cellipse cx='408' cy='292' rx='52' ry='15' transform='rotate(18 408 292)'/%3E%3Cellipse cx='478' cy='342' rx='55' ry='16' transform='rotate(-12 478 342)'/%3E%3Cellipse cx='350' cy='396' rx='64' ry='17' transform='rotate(12 350 396)'/%3E%3Cellipse cx='454' cy='425' rx='61' ry='16' transform='rotate(-18 454 425)'/%3E%3C/g%3E%3Cg fill='%23fff1b8' opacity='.9'%3E%3Cellipse cx='385' cy='350' rx='48' ry='13' transform='rotate(-8 385 350)'/%3E%3Cellipse cx='455' cy='374' rx='44' ry='13' transform='rotate(15 455 374)'/%3E%3Cellipse cx='308' cy='358' rx='38' ry='11' transform='rotate(28 308 358)'/%3E%3C/g%3E%3Cg fill='%235b8f3a'%3E%3Ccircle cx='302' cy='292' r='12'/%3E%3Ccircle cx='505' cy='302' r='10'/%3E%3Ccircle cx='458' cy='250' r='8'/%3E%3Ccircle cx='288' cy='427' r='9'/%3E%3C/g%3E%3Cg fill='%23fff' opacity='.88'%3E%3Ccircle cx='176' cy='118' r='6'/%3E%3Ccircle cx='660' cy='152' r='9'/%3E%3Ccircle cx='616' cy='460' r='5'/%3E%3C/g%3E%3Ctext x='52' y='96' fill='%23ffffff' font-family='Arial, sans-serif' font-size='58' font-weight='700'%3ETOP DEAL%3C/text%3E%3Ctext x='52' y='151' fill='%23fff7df' font-family='Arial, sans-serif' font-size='30' font-weight='600'%3EToday only%3C/text%3E%3C/svg%3E"
    />
    <div class="yd-deal-badge">Today only</div>
  </div>

  <div class="yd-deal-body">
    <p class="yd-deal-kicker">New Today</p>
    <h1 class="yd-deal-title">Flat 50% off on biryani cravings</h1>
    <p class="yd-deal-copy">Open the deal, pick your favourite restaurant, and order before the offer disappears tonight.</p>

    <div class="yd-deal-row">
      <div class="yd-deal-stat">
        <strong>50%</strong>
        <span>maximum offer</span>
      </div>
      <div class="yd-deal-stat">
        <strong>Today</strong>
        <span>limited window</span>
      </div>
    </div>
  </div>
</div>
